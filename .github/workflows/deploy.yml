name: CI/CD — Docker deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production stack
        run: |
          cat > .env <<EOF
          JWT_SECRET=ci-build-only-not-used-in-production
          RAZORPAY_KEY_ID=rzp_test_ci
          RAZORPAY_KEY_SECRET=ci-build-only
          FRONTEND_URL=http://localhost
          VITE_API_URL=
          VITE_PAYMENT_URL=
          EOF
          docker compose -f deploy/aws/docker-compose.prod.yml build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            export APP_DIR="${APP_DIR:-/opt/invoice-app}"
            export BRANCH="main"
            cd "$APP_DIR"
            bash deploy/aws/remote-deploy.sh
