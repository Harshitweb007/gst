services:
  mongodb:
    image: mongo:7
    container_name: invoice-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backendpart
      dockerfile: Dockerfile
    container_name: invoice-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongodb:27017/invoice_generator
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "5001"

  payment:
    build:
      context: ../..
      dockerfile: Dockerfile.payment
    container_name: invoice-payment
    restart: unless-stopped
    environment:
      PORT: 4000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    expose:
      - "4000"

  frontend:
    build:
      context: ../../frontendpart
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_PAYMENT_URL: ${VITE_PAYMENT_URL:-}
        VITE_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    container_name: invoice-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - payment
    expose:
      - "80"

  proxy:
    image: nginx:alpine
    container_name: invoice-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - payment
    ports:
      - "80:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
